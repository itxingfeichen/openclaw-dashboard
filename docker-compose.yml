version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-dashboard
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/data/openclaw.db
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production}
    volumes:
      - app-data:/app/data
      - app-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: Development service with hot reload
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: openclaw-dashboard-dev
    ports:
      - "3000:3000"
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - DB_PATH=/app/data/openclaw.db
    volumes:
      - .:/app
      - dev-node-modules:/app/node_modules
      - dev-frontend-node-modules:/app/frontend/node_modules
      - dev-backend-node-modules:/app/backend/node_modules
    command: npm run dev
    profiles:
      - dev

volumes:
  app-data:
  app-logs:
  dev-node-modules:
  dev-frontend-node-modules:
  dev-backend-node-modules:
